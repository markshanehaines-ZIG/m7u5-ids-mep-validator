<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 560" font-family="Inter, 'Segoe UI', Arial, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#1f2937"/>
    </marker>
    <style>
      .node { stroke: #1f2937; stroke-width: 1.5; }
      .label { font-size: 14px; fill: #111827; }
      .small { font-size: 11px; fill: #4b5563; }
      .title { font-size: 18px; font-weight: 600; fill: #111827; }
      .group { fill: #f9fafb; stroke: #d1d5db; stroke-dasharray: 5 4; }
      .ifc { fill: #e0f2fe; }
      .ids { fill: #fef3c7; }
      .core { fill: #dcfce7; }
      .report { fill: #f3e8ff; }
      .llm { fill: #fee2e2; }
      .line { stroke: #1f2937; stroke-width: 1.5; fill: none; }
    </style>
  </defs>

  <text class="title" x="20" y="32">M7U5 — IDS-driven MEP Validator: system architecture</text>

  <!-- Group: Inputs -->
  <rect class="group" x="20" y="60" width="200" height="320" rx="10"/>
  <text class="small" x="32" y="80">Inputs</text>

  <rect class="node ifc" x="40" y="100" width="160" height="60" rx="8"/>
  <text class="label" x="60" y="125">IFC4 model</text>
  <text class="small" x="60" y="142">.ifc file (binary)</text>

  <rect class="node ids" x="40" y="180" width="160" height="60" rx="8"/>
  <text class="label" x="60" y="205">IDS ruleset</text>
  <text class="small" x="60" y="222">mep_services_v1.ids</text>

  <rect class="node llm" x="40" y="260" width="160" height="100" rx="8"/>
  <text class="label" x="60" y="285">EIR clauses (NL)</text>
  <text class="small" x="60" y="302">queries/sample_eir_</text>
  <text class="small" x="60" y="316">clauses.txt</text>
  <text class="small" x="60" y="338">"All sprinklers shall ..."</text>

  <!-- Group: Core pipeline -->
  <rect class="group" x="260" y="60" width="380" height="430" rx="10"/>
  <text class="small" x="272" y="80">Core pipeline (src/)</text>

  <rect class="node core" x="280" y="100" width="160" height="60" rx="8"/>
  <text class="label" x="300" y="125">ifcopenshell</text>
  <text class="small" x="300" y="142">model = open(.ifc)</text>

  <rect class="node core" x="460" y="100" width="160" height="60" rx="8"/>
  <text class="label" x="480" y="125">ifctester.ids</text>
  <text class="small" x="480" y="142">doc = open(.ids)</text>

  <rect class="node core" x="280" y="200" width="340" height="70" rx="8"/>
  <text class="label" x="300" y="225">src/validator.py — Validator.run()</text>
  <text class="small" x="300" y="244">doc.validate(model)  -&gt;  ValidationRun</text>
  <text class="small" x="300" y="258">timing, per-spec applicable / pass / fail</text>

  <rect class="node llm" x="280" y="290" width="340" height="70" rx="8"/>
  <text class="label" x="300" y="315">src/llm_eir_to_ids.py</text>
  <text class="small" x="300" y="334">Claude (sonnet-4-6) -&gt; IDS spec XML</text>
  <text class="small" x="300" y="348">XSD-validated, merged or saved as new .ids</text>

  <rect class="node llm" x="280" y="380" width="340" height="70" rx="8"/>
  <text class="label" x="300" y="405">src/llm_remediation.py</text>
  <text class="small" x="300" y="424">per-failure plain-English advice</text>
  <text class="small" x="300" y="438">batched, written back into JSON report</text>

  <rect class="node core" x="280" y="470" width="340" height="50" rx="8"/>
  <text class="label" x="300" y="498">src/reporter.py — multi-format export</text>

  <!-- Group: Outputs -->
  <rect class="group" x="680" y="60" width="220" height="430" rx="10"/>
  <text class="small" x="692" y="80">Outputs (results/)</text>

  <rect class="node report" x="700" y="100" width="180" height="50" rx="8"/>
  <text class="label" x="720" y="128">JSON report</text>

  <rect class="node report" x="700" y="170" width="180" height="50" rx="8"/>
  <text class="label" x="720" y="198">HTML report</text>

  <rect class="node report" x="700" y="240" width="180" height="50" rx="8"/>
  <text class="label" x="720" y="268">BCF (issue tracker)</text>

  <rect class="node report" x="700" y="310" width="180" height="50" rx="8"/>
  <text class="label" x="720" y="338">summary.csv</text>

  <rect class="node report" x="700" y="380" width="180" height="50" rx="8"/>
  <text class="label" x="720" y="408">failures.csv</text>

  <rect class="node llm" x="700" y="450" width="180" height="50" rx="8"/>
  <text class="label" x="720" y="478">annotated JSON</text>

  <!-- Lines -->
  <path class="line" d="M200 130 L280 130" marker-end="url(#arrow)"/>
  <path class="line" d="M200 210 L460 130" marker-end="url(#arrow)"/>
  <path class="line" d="M200 310 L280 325" marker-end="url(#arrow)"/>

  <path class="line" d="M360 160 L360 200" marker-end="url(#arrow)"/>
  <path class="line" d="M540 160 L540 200" marker-end="url(#arrow)"/>

  <path class="line" d="M450 270 L450 470" marker-end="url(#arrow)"/>
  <path class="line" d="M620 235 L700 125" marker-end="url(#arrow)"/>
  <path class="line" d="M620 235 L700 195" marker-end="url(#arrow)"/>
  <path class="line" d="M620 495 L700 265" marker-end="url(#arrow)"/>
  <path class="line" d="M620 495 L700 335" marker-end="url(#arrow)"/>
  <path class="line" d="M620 495 L700 405" marker-end="url(#arrow)"/>
  <path class="line" d="M620 415 L700 475" marker-end="url(#arrow)"/>

  <!-- LLM loop back into IDS -->
  <path class="line" d="M280 325 Q 230 325 230 240 L 200 240" marker-end="url(#arrow)" stroke-dasharray="5 4"/>
  <text class="small" x="120" y="252">amend IDS</text>

  <!-- Legend -->
  <g transform="translate(20,440)">
    <text class="small" x="0" y="0">Legend</text>
    <rect class="node ifc" x="0" y="10" width="14" height="14"/><text class="small" x="22" y="22">IFC inputs</text>
    <rect class="node ids" x="90" y="10" width="14" height="14"/><text class="small" x="112" y="22">IDS rulesets</text>
    <rect class="node core" x="190" y="10" width="14" height="14"/><text class="small" x="212" y="22">openBIM core</text>
    <rect class="node llm" x="0" y="34" width="14" height="14"/><text class="small" x="22" y="46">LLM modules</text>
    <rect class="node report" x="100" y="34" width="14" height="14"/><text class="small" x="122" y="46">Report outputs</text>
  </g>
</svg>
